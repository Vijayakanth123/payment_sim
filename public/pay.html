<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3ef;
      --card: #ffffff;
      --ink: #111210;
      --ink-muted: #6b6b65;
      --ink-faint: #b0afa8;
      --red: #e03c2b;
      --red-soft: #fdf0ee;
      --red-border: #f5c5be;
      --green: #1d9a6c;
      --green-soft: #edf7f3;
      --green-border: #b6e2d3;
      --accent: #e8e3d8;
      --radius: 16px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.09);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .page-header {
      background: var(--ink);
      color: #fff;
      padding: 28px 24px 22px;
    }
    .page-header h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .page-header .sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* tab row */
    .tab-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15);
      padding: 9px 20px;
      border-radius: 40px;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .tab-btn.active {
      background: #fff;
      color: var(--ink);
      border-color: #fff;
    }
    .tab-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Settle banner ── */
    .settle-banner {
      margin: 20px 16px 0;
      background: var(--red-soft);
      border: 1.5px solid var(--red-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeSlideUp 0.3s ease both;
    }
    .settle-banner .icon { font-size: 28px; flex-shrink: 0; }
    .settle-banner .info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 2px;
    }
    .settle-banner .info span {
      font-size: 12px;
      color: var(--ink-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Sections ── */
    .section { margin: 20px 16px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* card wrapper */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    /* inputs */
    .input-row { display: flex; gap: 10px; }
    .field {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e3dc;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      transition: border-color 0.18s;
      outline: none;
    }
    .field:focus { border-color: var(--ink); }
    .field[readonly], .field:disabled {
      background: #ece9e3;
      color: var(--ink-muted);
      cursor: not-allowed;
      border-color: #dedad2;
    }
    select.field { cursor: pointer; }

    /* search button */
    .btn-search {
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .btn-search:hover { opacity: 0.82; }
    .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

    /* status text */
    .status-text {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 8px;
      min-height: 18px;
      font-family: 'JetBrains Mono', monospace;
    }
    .status-text.found { color: var(--green); }
    .status-text.error { color: var(--red); }

    /* receiver info box */
    .receiver-info {
      margin-top: 12px;
      padding: 12px 16px;
      background: var(--green-soft);
      border: 1.5px solid var(--green-border);
      border-radius: 12px;
      display: none;
      animation: fadeSlideUp 0.25s ease both;
    }
    .receiver-info.show { display: block; }
    .receiver-info .r-name {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .receiver-info .r-sub {
      font-size: 12px;
      color: var(--ink-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* locked receiver box (settle mode) */
    .locked-receiver {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--green-soft);
      border: 1.5px solid var(--green-border);
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .locked-receiver .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .locked-receiver .lname { font-weight: 700; font-size: 14px; }
    .locked-receiver .lsub  { font-size: 11px; color: var(--ink-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .lock-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid var(--green-border);
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    /* select with label */
    .select-wrap { margin-top: 14px; }
    .select-wrap label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: var(--ink-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* divider */
    .divider {
      height: 1px;
      background: #eceae4;
      margin: 18px 0;
    }

    /* amount field highlight */
    .amount-wrap { position: relative; }
    .amount-wrap .currency {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      color: var(--ink-muted);
      font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
    }
    .amount-wrap .field { padding-left: 30px; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }

    /* pay button */
    .btn-pay {
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(224,60,43,0.30);
      transition: background 0.15s, transform 0.1s;
    }
    .btn-pay:hover { background: #c8341f; }
    .btn-pay:active { transform: scale(0.98); }
    .btn-pay:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: #fff;
      padding: 12px 22px; border-radius: 40px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* animations */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="page-header">
    <h2 id="pageTitle">Payment</h2>
    <div class="sub" id="pageSubtitle">Send money instantly</div>
    <div class="tab-row">
      <button class="tab-btn active" id="userBtn" onclick="showUserPay()">Pay to User</button>
      <button class="tab-btn" id="bankBtn" onclick="showBankPay()">Pay to Bank</button>
    </div>
  </div>

  <!-- Settle banner (hidden by default) -->
  <div class="settle-banner" id="settleBanner" style="display:none;">
    <div class="icon">💸</div>
    <div class="info">
      <strong id="settleBannerTitle">Settling up</strong>
      <span id="settleBannerSub">—</span>
    </div>
  </div>

  <!-- USER SECTION -->
  <div id="userSection">
    <div class="section">
      <div class="section-label">Receiver</div>
      <div class="card">

        <!-- Settle mode: locked receiver (hidden by default) -->
        <div class="locked-receiver" id="lockedReceiver" style="display:none;">
          <div class="avatar" id="lockedAvatar">?</div>
          <div>
            <div class="lname" id="lockedName">—</div>
            <div class="lsub" id="lockedSub">auto-filled from group</div>
          </div>
          <span class="lock-badge">🔒 Locked</span>
        </div>

        <!-- Normal search (hidden in settle mode) -->
        <div id="searchRow">
          <div class="input-row">
            <input class="field" id="identifier" placeholder="Username or mobile number" />
            <button class="btn-search" onclick="searchReceiver()">Search</button>
          </div>
          <p class="status-text" id="status"></p>
          <div class="receiver-info" id="receiverBox"></div>
        </div>

        <div class="select-wrap">
          <label>Receiver's Account</label>
          <select class="field" id="accountSelect"></select>
        </div>

      </div>
    </div>
  </div>

  <!-- BANK SECTION -->
  <div id="bankSection" style="display:none;">
    <div class="section">
      <div class="section-label">Bank Account</div>
      <div class="card">
        <div class="input-row">
          <input class="field" id="accountNumber" placeholder="Account number" />
          <button class="btn-search" onclick="searchByAccount()">Search</button>
        </div>
        <p class="status-text" id="bankStatus"></p>
        <div class="receiver-info" id="bankReceiverBox"></div>
        <div class="select-wrap">
          <label>Receiver's Account</label>
          <select class="field" id="bankAccountSelect"></select>
        </div>
      </div>
    </div>
  </div>

  <!-- PAYMENT DETAILS -->
  <div class="section">
    <div class="section-label">Payment Details</div>
    <div class="card">

      <label style="font-size:11px;font-weight:700;letter-spacing:0.07em;color:var(--ink-muted);text-transform:uppercase;display:block;margin-bottom:6px;">Amount</label>
      <div class="amount-wrap">
        <span class="currency">₹</span>
        <input class="field" id="amount" type="number" placeholder="0.00" />
      </div>

      <div class="divider"></div>

      <label style="font-size:11px;font-weight:700;letter-spacing:0.07em;color:var(--ink-muted);text-transform:uppercase;display:block;margin-bottom:6px;">Your Account</label>
      <select class="field" id="fromAccountSelect"></select>

      <div class="divider"></div>

      <label style="font-size:11px;font-weight:700;letter-spacing:0.07em;color:var(--ink-muted);text-transform:uppercase;display:block;margin-bottom:6px;">Passcode</label>
      <input class="field" id="passcode" type="password" placeholder="Enter passcode" />

      <button class="btn-pay" id="payBtn" onclick="pay()">Pay Now</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    window.onload = function () {
      checkSettleMode();
      showUserPay();
      loadMyAccounts();
    };
  </script>
</body>
</html>
